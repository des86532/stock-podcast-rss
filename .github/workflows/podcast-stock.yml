name: Podcast Stock Tracker

on:
  schedule:
    # GitHub Actions cron uses UTC.
    # Runs at 01:00 Asia/Taipei on Thursday and Sunday.
    - cron: "0 17 * * 3,6"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Smoke test imports
        run: uv run python -c "import podcast_stock.main"

      - name: Validate required settings
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          YOUTUBE_CHANNEL_ID: ${{ vars.YOUTUBE_CHANNEL_ID }}
          PODCAST_RSS_URL: ${{ vars.PODCAST_RSS_URL || 'https://feeds.soundon.fm/podcasts/954689a5-3096-43a4-a80b-7810b219cef3.xml' }}
        run: |
          required=(GEMINI_API_KEY TELEGRAM_BOT_TOKEN TELEGRAM_CHAT_ID)
          if [ -z "$PODCAST_RSS_URL" ]; then
            required+=(YOUTUBE_CHANNEL_ID)
          fi

          missing=0
          for name in "${required[@]}"; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is not configured in GitHub Actions secrets/variables"
              missing=1
            fi
          done
          exit "$missing"

      - name: Run tracker
        env:
          PYTHONUNBUFFERED: "1"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          YOUTUBE_CHANNEL_ID: ${{ vars.YOUTUBE_CHANNEL_ID }}
          PODCAST_RSS_URL: ${{ vars.PODCAST_RSS_URL || 'https://feeds.soundon.fm/podcasts/954689a5-3096-43a4-a80b-7810b219cef3.xml' }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash' }}
          MAX_VIDEOS_PER_RUN: ${{ vars.MAX_VIDEOS_PER_RUN || '1' }}
          ENABLE_WHISPER_FALLBACK: ${{ vars.ENABLE_WHISPER_FALLBACK || 'true' }}
          WHISPER_MODEL: ${{ vars.WHISPER_MODEL || 'small' }}
          WHISPER_LANGUAGE: ${{ vars.WHISPER_LANGUAGE || 'zh' }}
          SAVE_OUTPUTS: ${{ vars.SAVE_OUTPUTS || 'true' }}
          OUTPUT_DIR: ${{ vars.OUTPUT_DIR || 'runs' }}
        run: |
          set -euxo pipefail
          uv run python -m podcast_stock.main

      - name: Commit run artifacts
        if: always()
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: save podcast transcripts"
          file_pattern: runs/**/metadata.json runs/**/transcript.txt

      - name: Commit summaries
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: save podcast summaries"
          file_pattern: runs/**/summary.md

      - name: Commit state file
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update processed podcast videos"
          file_pattern: processed_videos.json
